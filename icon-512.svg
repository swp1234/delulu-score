<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF6B9D"/>
      <stop offset="100%" stop-color="#E0527E"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="40%" r="50%">
      <stop offset="0%" stop-color="#fff" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#fff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="bubbleGlow" cx="50%" cy="40%" r="50%">
      <stop offset="0%" stop-color="#FFF5F8" stop-opacity="1"/>
      <stop offset="100%" stop-color="#fff" stop-opacity="0.9"/>
    </radialGradient>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="100" fill="url(#bg)"/>
  <rect width="512" height="512" rx="100" fill="url(#glow)"/>
  <!-- Thought bubble - main cloud -->
  <ellipse cx="256" cy="210" rx="130" ry="100" fill="url(#bubbleGlow)"/>
  <ellipse cx="200" cy="220" rx="70" ry="60" fill="#fff" opacity="0.6"/>
  <ellipse cx="310" cy="215" rx="65" ry="55" fill="#fff" opacity="0.5"/>
  <ellipse cx="256" cy="175" rx="80" ry="50" fill="#fff" opacity="0.4"/>
  <!-- Thought bubble - tail dots -->
  <circle cx="160" cy="335" r="28" fill="#fff" opacity="0.85"/>
  <circle cx="120" cy="385" r="17" fill="#fff" opacity="0.8"/>
  <circle cx="92" cy="418" r="10" fill="#fff" opacity="0.7"/>
  <!-- Heart inside bubble -->
  <path d="M220 185 C220 160, 256 142, 256 175 C256 142, 292 160, 292 185 C292 220, 256 255, 256 255 C256 255, 220 220, 220 185Z" fill="#FF6B9D" opacity="0.85"/>
  <!-- Inner heart highlight -->
  <path d="M235 188 C235 175, 256 165, 256 182 C256 165, 277 175, 277 188 C277 205, 256 225, 256 225 C256 225, 235 205, 235 188Z" fill="#FFB3CC" opacity="0.4"/>
  <!-- Large sparkles -->
  <circle cx="80" cy="80" r="8" fill="#fff" opacity="0.8"/>
  <circle cx="430" cy="90" r="6" fill="#fff" opacity="0.7"/>
  <circle cx="440" cy="400" r="8" fill="#fff" opacity="0.6"/>
  <circle cx="70" cy="440" r="6" fill="#fff" opacity="0.5"/>
  <!-- Medium sparkles -->
  <circle cx="170" cy="60" r="5" fill="#fff" opacity="0.5"/>
  <circle cx="380" cy="55" r="4" fill="#fff" opacity="0.4"/>
  <circle cx="460" cy="240" r="5" fill="#fff" opacity="0.6"/>
  <circle cx="50" cy="300" r="4" fill="#fff" opacity="0.5"/>
  <circle cx="400" cy="450" r="5" fill="#fff" opacity="0.4"/>
  <circle cx="130" cy="460" r="4" fill="#fff" opacity="0.6"/>
  <!-- Small sparkles -->
  <circle cx="320" cy="50" r="3" fill="#fff" opacity="0.4"/>
  <circle cx="470" cy="160" r="3" fill="#fff" opacity="0.3"/>
  <circle cx="40" cy="200" r="3" fill="#fff" opacity="0.5"/>
  <circle cx="475" cy="330" r="3" fill="#fff" opacity="0.4"/>
  <circle cx="256" cy="460" r="3" fill="#fff" opacity="0.3"/>
  <circle cx="350" cy="470" r="2" fill="#fff" opacity="0.4"/>
  <!-- Cross sparkle accents -->
  <g opacity="0.7">
    <line x1="74" y1="80" x2="86" y2="80" stroke="#fff" stroke-width="2.5"/>
    <line x1="80" y1="74" x2="80" y2="86" stroke="#fff" stroke-width="2.5"/>
  </g>
  <g opacity="0.6">
    <line x1="424" y1="90" x2="436" y2="90" stroke="#fff" stroke-width="2"/>
    <line x1="430" y1="84" x2="430" y2="96" stroke="#fff" stroke-width="2"/>
  </g>
  <g opacity="0.5">
    <line x1="434" y1="400" x2="446" y2="400" stroke="#fff" stroke-width="2.5"/>
    <line x1="440" y1="394" x2="440" y2="406" stroke="#fff" stroke-width="2.5"/>
  </g>
  <g opacity="0.6">
    <line x1="164" y1="60" x2="176" y2="60" stroke="#fff" stroke-width="2"/>
    <line x1="170" y1="54" x2="170" y2="66" stroke="#fff" stroke-width="2"/>
  </g>
</svg>
