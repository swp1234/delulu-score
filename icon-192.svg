<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192" width="192" height="192">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF6B9D"/>
      <stop offset="100%" stop-color="#E0527E"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="40%" r="50%">
      <stop offset="0%" stop-color="#fff" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#fff" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <!-- Background -->
  <rect width="192" height="192" rx="40" fill="url(#bg)"/>
  <rect width="192" height="192" rx="40" fill="url(#glow)"/>
  <!-- Thought bubble - main -->
  <ellipse cx="96" cy="82" rx="48" ry="38" fill="#fff" opacity="0.9"/>
  <!-- Thought bubble - tail dots -->
  <circle cx="62" cy="128" r="10" fill="#fff" opacity="0.85"/>
  <circle cx="48" cy="148" r="6" fill="#fff" opacity="0.8"/>
  <!-- Heart inside bubble -->
  <path d="M84 72 C84 64, 96 58, 96 70 C96 58, 108 64, 108 72 C108 84, 96 96, 96 96 C96 96, 84 84, 84 72Z" fill="#FF6B9D" opacity="0.9"/>
  <!-- Sparkles -->
  <circle cx="38" cy="38" r="4" fill="#fff" opacity="0.8"/>
  <circle cx="155" cy="42" r="3" fill="#fff" opacity="0.6"/>
  <circle cx="158" cy="148" r="4" fill="#fff" opacity="0.7"/>
  <circle cx="32" cy="160" r="3" fill="#fff" opacity="0.5"/>
  <!-- Star sparkles -->
  <g opacity="0.7">
    <line x1="148" y1="36" x2="162" y2="36" stroke="#fff" stroke-width="2"/>
    <line x1="155" y1="29" x2="155" y2="43" stroke="#fff" stroke-width="2"/>
  </g>
</svg>
